<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografía de Producto</title>

    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/galery.css">

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.1/dist/jquery.min.js"></script>
    <script src="js/script.js"></script>
    <script src="https://kit.fontawesome.com/fd4f5ea601.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top navbarScroll">
        <div class="container">
            <a class="navbar-brand links-nav" href="index.html">
                <img src="images/logoblanco.png" style="width: 145px; height: 60px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item active">
                        <a class="nav-link links-nav" href="">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link links-nav dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Fotografía
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Fotografía de producto</a></li>
                            <li><a class="dropdown-item" href="#">Fotografía publicitaria</a></li>
                            <li><a class="dropdown-item" href="#">Fotografía corporativa</a></li>
                            <li><a class="dropdown-item" href="#">Fotografía de turismo</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link links-nav dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Video
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Video publicitario</a></li>
                            <li><a class="dropdown-item" href="#">Video corporativo</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link links-nav" href="#footer">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Galería -->
    <section class="gallery" style="margin-top: 6em;">
        <div class="container">
            <div class="grid">
                <div class="column-xs-12 column-md-4">
                    <figure class="img-container">
                        <img class="foto" src="images/foto-producto/HAMBURGO(v).jpg" />
                    </figure>
                </div>
                <div class="column-xs-12 column-md-4">
                    <figure class="img-container">
                        <img class="foto" src="images/foto-producto/product-hamburger(v).jpg" />
                    </figure>
                </div>
                <div class="column-xs-12 column-md-4">
                  <figure class="img-container">
                    <img class="foto" src="images/foto-producto/product-hamburger-2(v).jpg">
                  </figure>
                </div>
                <div class="column-xs-12 column-md-6">
                  <figure class="img-container">
                    <img class="foto" src="images/foto-producto/Mozzafiato-17(h).JPG" />
                  </figure>
                </div>
                <div class="column-xs-12 column-md-6">
                  <figure class="img-container">
                    <img class="foto" src="images/foto-producto/Mozzafiato-26(v).JPG" />
                  </figure>
                </div>
                <div class="column-xs-12">
                  <figure class="img-container">
                    <img class="foto" src="images/foto-producto/Mozzafiato-19(h).JPG" />
                  </figure>
                </div>
          </div>
        </div>
